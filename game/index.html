<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
    body{
    text-align: center;
    font-family: Arial;
    background-color: #f2f2f2;
}

.board{
    width: 320px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
}

.box{
    width: 100px;
    height: 100px;
    margin: 3px;
    font-size: 40px;
    cursor: pointer;
    background: whitesmoke;
}

#reset{
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 18px;
}
</style>
<body>

  <h1>Tic Tac Toe</h1>

  <div class="board">
    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>

    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>

    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>
  </div>

  <h2 id="msg"></h2>

  <button id="reset">Reset Game</button>

  <script src="index.js"></script>
</body>
</html>
